{% extends 'base.html' %}

{% block content %}
    <h1>Products</h1>
    <form method="get" action="{% url 'home' %}" class="mb-4">
        <input
            type="text"
            name="q"
            placeholder="Search products..."
            value="{{ query|default:'' }}"
        >
        <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <div class="mb-4">
        <a href="/" class="btn btn-outline-secondary">All</a>
        <a href="/?category=fruit" class="btn btn-outline-primary">Fruit</a>
        <a href="/?category=drink" class="btn btn-outline-primary">Drink</a>
        <a href="/?category=snack" class="btn btn-outline-primary">Snack</a>
    </div>
    <div class="row">
        {% for product in products %}
        <div class="col-md-4 mb-4">
        <div class="card h-100">
            <img src="{{ product.image_url }}"
                 class="card-img-top"
                 style="height:250px; object-fit:cover;">

            <div class="card-body">
                <h5 class="card-title">{{ product.name }}</h5>
                <p class="card-text">${{ product.price }}</p>
                <a href="{% url 'product_detail' product.id %}" class="btn btn-outline-primary">
                    View Details
                </a>

                <form method="post" action="{% url 'add_to_cart' product.id %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-primary">Add to Cart</button>
                </form>
            </div>
        </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
